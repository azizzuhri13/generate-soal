<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BantuGuru Soal - Generator AI</title>
    
    <script src="https://cdn.tailwindcss.com" onerror="console.error('Peringatan: Tailwind CSS diblokir atau gagal dimuat oleh jaringan Anda.')"></script>
    <script src="https://unpkg.com/@phosphor-icons/web" onerror="console.error('Phosphor Icons gagal dimuat.')"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5B4BCA',
                        secondary: '#EBE9FE',
                        background: '#F4F7FE'
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { background-color: #F8F9FE; }

        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            .print-area { 
                width: 100% !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                border: none !important; 
                box-shadow: none !important; 
                overflow: visible !important;
            }
            .page-break { page-break-inside: avoid; }
        }
    </style>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                isLoading: false,
                activeTab: 'soal', 
                apiKey: localStorage.getItem('geminiApiKey') || '', 
                hasApiKey: Boolean(localStorage.getItem('geminiApiKey')), // State penentu halaman awal
                
                toast: { show: false, message: '', type: 'info' },

                showToast(msg, type = 'info') {
                    this.toast.message = msg;
                    this.toast.type = type;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                },

                // Fungsi untuk menyimpan API Key dari halaman awal
                saveInitialApiKey() {
                    if (this.apiKey && this.apiKey.trim().length > 10) {
                        localStorage.setItem('geminiApiKey', this.apiKey.trim());
                        this.hasApiKey = true;
                        this.showToast("API Key berhasil disimpan! Selamat datang.", "success");
                    } else {
                        this.showToast("Harap masukkan API Key yang valid.", "error");
                    }
                },
                
                showSettingsModal: false,
                kopSurat: {
                    sekolah: 'SDN SUKAMAHI',
                    alamat: 'Jl. Pendidikan No. 123, Kec. Cerdas, Kab. Ilmu',
                    telepon: '(021) 1234567',
                    email: 'info@sdnsukamahi.sch.id',
                    logo: null 
                },

                formData: {
                    kurikulum: 'Merdeka',
                    guru: 'Faisal',
                    jenjang: 'SMP', 
                    kelas: '8',
                    mapel: 'Ilmu Pengetahuan Alam (IPA)',
                    topik: 'Sistem Pencernaan',
                    jenisAsesmen: 'Sumatif Tengah Semester',
                    opsiPG: '4 Opsi (A-D)',
                    jumlahPG: 5,
                    jumlahIsian: 2,
                    jumlahEssay: 2,
                    jumlahIlustrasi: 0,
                    jumlahDiagram: 0,
                    jumlahPetaKonsep: 0
                },
                results: [],
                editingIndex: null,
                deleteConfirm: { show: false, index: null },
                
                confirmDelete() {
                    if (this.deleteConfirm.index !== null) {
                        this.results.splice(this.deleteConfirm.index, 1);
                        this.deleteConfirm.show = false;
                        this.deleteConfirm.index = null;
                        this.editingIndex = null;
                    }
                },
                
                init() {
                    try {
                        this.$watch('formData.jenjang', (value) => {
                            const j = String(value || '');
                            if (j.includes('SD')) this.formData.kelas = '1';
                            if (j.includes('SMP')) this.formData.kelas = '7';
                            if (j.includes('SMA') || j.includes('SMK')) this.formData.kelas = '10';
                            
                            setTimeout(() => {
                                if(this.mapelGroups && this.mapelGroups[0] && this.mapelGroups[0].options) {
                                    this.formData.mapel = this.mapelGroups[0].options[0];
                                }
                            }, 50);
                        });
                        this.$watch('formData.kurikulum', () => {
                            setTimeout(() => {
                                if(this.mapelGroups && this.mapelGroups[0] && this.mapelGroups[0].options) {
                                    this.formData.mapel = this.mapelGroups[0].options[0];
                                }
                            }, 50);
                        });
                    } catch(e) { console.error("Init fallback: ", e); }
                },

                get kelasOptionsHtml() {
                    try {
                        const j = String(this.formData.jenjang || '');
                        let list = [1, 2, 3, 4, 5, 6];
                        if (j.includes('SMP')) list = [7, 8, 9];
                        if (j.includes('SMA') || j.includes('SMK')) list = [10, 11, 12];
                        
                        return list.map(i => `<option value="${i}">Kelas ${i}</option>`).join('');
                    } catch(e) { return `<option value="1">Kelas 1</option>`; }
                },

                get mapelGroups() {
                    try {
                        const j = String(this.formData.jenjang || '');
                        const muatanLokal = {
                            label: 'Muatan Lokal & Tambahan',
                            options: ['Pendidikan Wahidiyah', 'Bahasa Daerah', 'Prakarya', 'TIK / Informatika', 'Kewirausahaan', 'Bimbingan Konseling']
                        };

                        if (this.formData.kurikulum === 'Merdeka' && (j.includes('SMA') || j.includes('SMK'))) {
                            return [
                                {
                                    label: 'Mata Pelajaran Wajib',
                                    options: ['Agama', 'PPKn', 'Bahasa Indonesia', 'Matematika', 'Fisika', 'Kimia', 'Biologi', 'Sosiologi', 'Ekonomi', 'Sejarah', 'Geografi', 'Bahasa Inggris', 'PJOK', 'Informatika', 'Seni/Prakarya']
                                },
                                muatanLokal
                            ];
                        }
                        
                        return [
                            {
                                label: 'Mata Pelajaran Umum (SD/SMP/SMA/SMK)',
                                options: ['Pendidikan Agama dan Budi Pekerti', 'Pendidikan Pancasila / PKn', 'Bahasa Indonesia', 'Matematika', 'Ilmu Pengetahuan Alam (IPA)', 'Ilmu Pengetahuan Sosial (IPS)', 'Bahasa Inggris', 'PJOK', 'Seni Budaya']
                            },
                            muatanLokal
                        ];
                    } catch(e) { 
                        return [{ label: 'Mata Pelajaran', options: ['Pendidikan Agama', 'Bahasa Indonesia', 'Matematika', 'Ilmu Pengetahuan Alam (IPA)', 'Ilmu Pengetahuan Sosial (IPS)', 'Bahasa Inggris'] }]; 
                    }
                },

                get mapelOptionsHtml() {
                    try {
                        let html = '';
                        this.mapelGroups.forEach(group => {
                            html += `<optgroup label="${group.label}">`;
                            group.options.forEach(mapel => {
                                html += `<option value="${mapel}">${mapel}</option>`;
                            });
                            html += `</optgroup>`;
                        });
                        return html;
                    } catch(e) { return `<option value="IPA">IPA</option>`; }
                },

                get totalSoal() {
                    try {
                        return (parseInt(this.formData.jumlahPG) || 0) + 
                               (parseInt(this.formData.jumlahIsian) || 0) + 
                               (parseInt(this.formData.jumlahEssay) || 0);
                    } catch(e) { return 0; }
                },

                handleLogoUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    if (file.size > 500 * 1024) {
                        this.showToast("Ukuran file terlalu besar! Maksimal ukuran logo adalah 500KB.", "error");
                        event.target.value = '';
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => { this.kopSurat.logo = e.target.result; };
                    reader.readAsDataURL(file);
                },

                removeLogo() {
                    this.kopSurat.logo = null;
                    document.getElementById('logoUpload').value = '';
                },

                generateImage(index, promptText) {
                    if (!promptText) return;
                    this.results[index].isGeneratingImage = true;
                    
                    const safePrompt = encodeURIComponent("clean educational illustration of " + promptText);
                    const randomSeed = Math.floor(Math.random() * 1000000);
                    const imageUrl = `https://image.pollinations.ai/prompt/${safePrompt}?width=600&height=350&nologo=true&seed=${randomSeed}`;

                    const img = new Image();
                    img.onload = () => {
                        this.results[index].gambar = imageUrl;
                        this.results[index].isGeneratingImage = false;
                    };
                    img.onerror = () => {
                        this.showToast("Gagal memuat gambar. Silakan coba lagi.", "error");
                        this.results[index].isGeneratingImage = false;
                    };
                    img.src = imageUrl;
                },

                exportJSON() {
                    if(this.results.length === 0) return this.showToast("Belum ada soal untuk diekspor.", "error");
                    
                    const exportData = {
                        formData: this.formData,
                        results: this.results
                    };
                    
                    const dataStr = JSON.stringify(exportData, null, 2);
                    const blob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Soal_${this.formData.mapel}_${this.formData.topik.replace(/\s+/g, '_')}.json`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                },

                triggerImport() { document.getElementById('importFile').click(); },

                handleImport(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const importedData = JSON.parse(e.target.result);
                            
                            let importedResults = [];
                            if (importedData && importedData.formData && Array.isArray(importedData.results)) {
                                this.formData = { ...this.formData, ...importedData.formData };
                                importedResults = importedData.results;
                                this.showToast("Data soal dan konfigurasi berhasil diimpor!", "success");
                            } else if(Array.isArray(importedData)) {
                                importedResults = importedData;
                                this.showToast("Data soal diimpor! (Format lama)", "info");
                            } else { 
                                return this.showToast("Format file JSON tidak valid.", "error"); 
                            }

                            this.results = importedResults.map(item => ({ 
                                ...item, 
                                isGeneratingImage: false,
                                kognitif: item.kognitif || 'C3 (Mengaplikasikan)',
                                indikator: item.indikator || 'Peserta didik mampu menyelesaikan soal terkait materi ini.',
                                alasan: item.alasan || 'Tidak ada rubrik/pembahasan spesifik yang tersimpan untuk soal ini.',
                                opsi: item.opsi || ["Opsi A", "Opsi B", "Opsi C", "Opsi D"] 
                            }));
                        } catch (err) { 
                            this.showToast("Gagal membaca file JSON.", "error"); 
                        }
                    };
                    reader.readAsText(file);
                    event.target.value = '';
                },

                exportWord() {
                    if(this.results.length === 0) return this.showToast("Belum ada dokumen untuk diekspor.", "error");
                    this.activeTab = 'soal';
                    setTimeout(() => {
                        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Soal Evaluasi</title><style>body { font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 1.5; color: black; } table { width: 100%; border-collapse: collapse; } td { vertical-align: top; } .no-soal { width: 30px; text-align: left; padding-bottom: 15px; } .soal-isi { padding-bottom: 15px; } .opsi-list { list-style-type: upper-alpha; margin-top: 5px; padding-left: 20px; } .opsi-list li { margin-bottom: 3px; }</style></head><body>";
                        const footer = "</body></html>";
                        
                        let htmlContent = `
                            <table style="width: 100%; border-bottom: 3px double black; margin-bottom: 20px; padding-bottom: 10px;">
                                <tr>
                                    <td style="width: 15%; text-align: center; vertical-align: middle;">
                                        ${this.kopSurat.logo ? `<img src="${this.kopSurat.logo}" width="80" height="80">` : ''}
                                    </td>
                                    <td style="width: 85%; text-align: center; vertical-align: middle;">
                                        <span style="font-size: 16pt; font-weight: bold;">${this.kopSurat.sekolah.toUpperCase()}</span><br>
                                        <span style="font-size: 11pt;">${this.kopSurat.alamat}</span><br>
                                        <span style="font-size: 10pt;">Telp: ${this.kopSurat.telepon} | Email: ${this.kopSurat.email}</span>
                                    </td>
                                </tr>
                            </table>
                            
                            <div style="text-align: left; margin-top: 15px;">
                                <div style="font-size: 12pt; font-weight: bold; text-transform: uppercase; margin-bottom: 10px;">${this.formData.jenisAsesmen}</div>
                                <table style="width: 100%; font-size: 11pt; border: none; margin-bottom: 20px;">
                                    <tr>
                                        <td style="width: 15%; padding-bottom: 2px;">Mata Pelajaran</td>
                                        <td style="width: 35%; padding-bottom: 2px;">: <b>${this.formData.mapel}</b></td>
                                        <td style="width: 15%; padding-bottom: 2px;">Kelas / Jenjang</td>
                                        <td style="width: 35%; padding-bottom: 2px;">: <b>${this.formData.jenjang} Kelas ${this.formData.kelas}</b></td>
                                    </tr>
                                    <tr>
                                        <td style="padding-bottom: 2px;">Kurikulum</td>
                                        <td style="padding-bottom: 2px;">: <b>${this.formData.kurikulum}</b></td>
                                        <td></td><td></td>
                                    </tr>
                                </table>
                            </div>
                            <table>
                        `;

                        this.results.forEach((soal, index) => {
                            htmlContent += `
                                <tr>
                                    <td class="no-soal">${index + 1}.</td>
                                    <td class="soal-isi">
                                        <div style="margin-bottom: 5px;">${soal.pertanyaan}</div>
                                        ${soal.gambar ? `<div style="margin-bottom: 10px; text-align: left;"><img src="${soal.gambar}" width="300"></div>` : ''}
                            `;
                            
                            if (soal.jenis === 'Pilihan Ganda') {
                                htmlContent += `<ol class="opsi-list">`;
                                if(soal.opsi && Array.isArray(soal.opsi)) {
                                    soal.opsi.forEach(opt => { htmlContent += `<li>${opt}</li>`; });
                                }
                                htmlContent += `</ol>`;
                            } else if (soal.jenis === 'Isian Singkat') {
                                htmlContent += `<p style="margin-top: 15px;">Jawaban: ________________________________________________________</p>`;
                            } else if (soal.jenis === 'Essay') {
                                htmlContent += `<p style="margin-top: 15px;">Jawaban:</p><p><br><br><br><br><br></p>`;
                            }

                            htmlContent += `</td></tr>`;
                        });
