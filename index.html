<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BantuGuru Soal - Generator AI</title>
    
    <script src="https://cdn.tailwindcss.com" onerror="console.error('Peringatan: Tailwind CSS diblokir atau gagal dimuat oleh jaringan Anda.')"></script>
    <script src="https://unpkg.com/@phosphor-icons/web" onerror="console.error('Phosphor Icons gagal dimuat.')"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5B4BCA',
                        secondary: '#EBE9FE',
                        background: '#F4F7FE'
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { background-color: #F8F9FE; }

        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            .print-area { 
                width: 100% !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                border: none !important; 
                box-shadow: none !important; 
                overflow: visible !important;
            }
            .page-break { page-break-inside: avoid; }
        }
    </style>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                isLoading: false,
                activeTab: 'soal', 
                apiKey: '', 
                toast: { show: false, message: '', type: 'info' },
                showSettingsModal: false,
                
                kopSurat: {
                    sekolah: 'SMP Wahidiyah',
                    alamat: 'Jl. Anggrek, Desa Pringu, Kec. Bululawang, Kab. Malang',
                    telepon: '(021) 1234567',
                    email: 'info@smpwahidiyahbll.sch.id',
                    logo: null 
                },

                formData: {
                    kurikulum: 'Merdeka',
                    guru: '',
                    jenjang: 'SMP/MTs', 
                    kelas: '7',
                    mapel: 'Ilmu Pengetahuan Alam (IPA)',
                    topik: '',
                    jenisAsesmen: 'Sumatif Tengah Semester',
                    opsiPG: '4 Opsi (A-D)',
                    jumlahPG: 5,
                    jumlahIsian: 2,
                    jumlahEssay: 2,
                    jumlahIlustrasi: 0,
                    jumlahDiagram: 0,
                    jumlahPetaKonsep: 0
                },
                results: [],
                editingIndex: null,
                deleteConfirm: { show: false, index: null },
                
                setTab(tab) { this.activeTab = tab; },
                openSettings() { this.showSettingsModal = true; },
                closeSettings() { this.showSettingsModal = false; },
                editSoal(index) { this.editingIndex = index; },
                cancelEdit() { this.editingIndex = null; },
                confirmDeletePrompt(index) { this.deleteConfirm = { show: true, index: index }; },
                cancelDelete() { this.deleteConfirm = { show: false, index: null }; },
                removeGambar(index) { this.results[index].gambar = null; },
                triggerLogoUpload() { 
                    const el = document.getElementById('logoUpload');
                    if (el) el.click();
                },

                confirmDelete() {
                    if (this.deleteConfirm.index !== null) {
                        this.results.splice(this.deleteConfirm.index, 1);
                        this.cancelDelete();
                        this.cancelEdit();
                    }
                },

                showToast(msg, type = 'info') {
                    this.toast.message = msg;
                    this.toast.type = type;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                },

                saveApiKey() {
                    try {
                        if (typeof window !== 'undefined' && window.localStorage) {
                            window.localStorage.setItem('geminiApiKey', this.apiKey);
                        }
                    } catch (e) {
                        console.warn("Gagal menyimpan ke LocalStorage.");
                    }
                },
                
                init() {
                    try {
                        if (typeof window !== 'undefined' && window.localStorage) {
                            this.apiKey = window.localStorage.getItem('geminiApiKey') || '';
                        }
                    } catch (e) {
                        console.warn("Akses LocalStorage diblokir oleh browser.");
                    }

                    this.$watch('formData.jenjang', (value) => {
                        const j = String(value || '');
                        if (j.includes('SD')) this.formData.kelas = '1';
                        if (j.includes('SMP')) this.formData.kelas = '7';
                        if (j.includes('SMA') || j.includes('SMK')) this.formData.kelas = '10';
                    });
                },

                get totalSoal() {
                    return (parseInt(this.formData.jumlahPG) || 0) + 
                           (parseInt(this.formData.jumlahIsian) || 0) + 
                           (parseInt(this.formData.jumlahEssay) || 0);
                },

                handleLogoUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    if (file.size > 500 * 1024) {
                        this.showToast("Ukuran file terlalu besar! Maksimal 500KB.", "error");
                        event.target.value = '';
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => { this.kopSurat.logo = e.target.result; };
                    reader.readAsDataURL(file);
                },

                removeLogo() {
                    this.kopSurat.logo = null;
                    const el = document.getElementById('logoUpload');
                    if(el) el.value = '';
                },

                generateImage(index, promptText) {
                    if (!promptText) return;
                    this.results[index].isGeneratingImage = true;
                    
                    const safePrompt = encodeURIComponent("clean educational illustration of " + promptText);
                    const randomSeed = Math.floor(Math.random() * 1000000);
                    const imageUrl = `https://image.pollinations.ai/prompt/${safePrompt}?width=600&height=350&nologo=true&seed=${randomSeed}`;

                    const img = new Image();
                    img.onload = () => {
                        this.results[index].gambar = imageUrl;
                        this.results[index].isGeneratingImage = false;
                    };
                    img.onerror = () => {
                        this.showToast("Gagal memuat gambar. Silakan coba lagi.", "error");
                        this.results[index].isGeneratingImage = false;
                    };
                    img.src = imageUrl;
                },

                exportJSON() {
                    if(this.results.length === 0) return this.showToast("Belum ada soal untuk diekspor.", "error");
                    
                    const exportData = {
                        formData: this.formData,
                        results: this.results
                    };
                    
                    const dataStr = JSON.stringify(exportData, null, 2);
                    const blob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Soal_${this.formData.mapel}_${this.formData.topik.replace(/\s+/g, '_')}.json`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                },

                triggerImport() { 
                    const el = document.getElementById('importFile');
                    if(el) el.click(); 
                },

                handleImport(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const importedData = JSON.parse(e.target.result);
                            
                            let importedResults = [];
                            if (importedData && importedData.formData && Array.isArray(importedData.results)) {
                                this.formData = { ...this.formData, ...importedData.formData };
                                importedResults = importedData.results;
                                this.showToast("Data soal dan konfigurasi berhasil diimpor!", "success");
                            } else if(Array.isArray(importedData)) {
                                importedResults = importedData;
                                this.showToast("Data soal diimpor! (Format lama)", "info");
                            } else { 
                                return this.showToast("Format file JSON tidak valid.", "error"); 
                            }

                            this.results = importedResults.map(item => ({ 
                                ...item, 
                                isGeneratingImage: false,
                                kognitif: item.kognitif || 'C3 (Mengaplikasikan)',
                                indikator: item.indikator || 'Peserta didik mampu menyelesaikan soal terkait materi ini.',
                                alasan: item.alasan || 'Tidak ada rubrik/pembahasan spesifik yang tersimpan untuk soal ini.',
                                opsi: item.opsi || ["Opsi A", "Opsi B", "Opsi C", "Opsi D"] 
                            }));
                        } catch (err) { 
                            this.showToast("Gagal membaca file JSON.", "error"); 
                        }
                    };
                    reader.readAsText(file);
                    event.target.value = '';
                },

                exportWord() {
                    if(this.results.length === 0) return this.showToast("Belum ada dokumen untuk diekspor.", "error");
                    this.setTab('soal');
                    setTimeout(() => {
                        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Soal Evaluasi</title><style>body { font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 1.5; color: black; } table { width: 100%; border-collapse: collapse; } td { vertical-align: top; } .no-soal { width: 30px; text-align: left; padding-bottom: 15px; } .soal-isi { padding-bottom: 15px; } .opsi-list { list-style-type: upper-alpha; margin-top: 5px; padding-left: 20px; } .opsi-list li { margin-bottom: 3px; }</style></head><body>";
                        const footer = "</body></html>";
                        
                        let htmlContent = `
                            <table style="width: 100%; border-bottom: 3px double black; margin-bottom: 20px; padding-bottom: 10px;">
                                <tr>
                                    <td style="width: 15%; text-align: center; vertical-align: middle;">
                                        ${this.kopSurat.logo ? `<img src="${this.kopSurat.logo}" width="80" height="80">` : ''}
                                    </td>
                                    <td style="width: 85%; text-align: center; vertical-align: middle;">
                                        <span style="font-size: 16pt; font-weight: bold;">${this.kopSurat.sekolah.toUpperCase()}</span><br>
                                        <span style="font-size: 11pt;">${this.kopSurat.alamat}</span><br>
                                        <span style="font-size: 10pt;">Telp: ${this.kopSurat.telepon} | Email: ${this.kopSurat.email}</span>
                                    </td>
                                </tr>
                            </table>
                            
                            <div style="text-align: left; margin-top: 15px;">
                                <div style="font-size: 12pt; font-weight: bold; text-transform: uppercase; margin-bottom: 10px;">${this.formData.jenisAsesmen}</div>
                                <table style="width: 100%; font-size: 11pt; border: none; margin-bottom: 20px;">
                                    <tr>
                                        <td style="width: 15%; padding-bottom: 2px;">Mata Pelajaran</td>
                                        <td style="width: 35%; padding-bottom: 2px;">: <b>${this.formData.mapel}</b></td>
                                        <td style="width: 15%; padding-bottom: 2px;">Kelas / Jenjang</td>
                                        <td style="width: 35%; padding-bottom: 2px;">: <b>${this.formData.jenjang} Kelas ${this.formData.kelas}</b></td>
                                    </tr>
                                    <tr>
                                        <td style="padding-bottom: 2px;">Kurikulum</td>
                                        <td style="padding-bottom: 2px;">: <b>${this.formData.kurikulum}</b></td>
                                        <td></td><td></td>
                                    </tr>
                                </table>
                            </div>
                            <table>
                        `;

                        this.results.forEach((soal, index) => {
                            htmlContent += `
                                <tr>
                                    <td class="no-soal">${index + 1}.</td>
                                    <td class="soal-isi">
                                        <div style="margin-bottom: 5px;">${soal.pertanyaan}</div>
                                        ${soal.gambar ? `<div style="margin-bottom: 10px; text-align: left;"><img src="${soal.gambar}" width="300"></div>` : ''}
                            `;
                            
                            if (soal.jenis === 'Pilihan Ganda') {
                                htmlContent += `<ol class="opsi-list">`;
                                if(soal.opsi && Array.isArray(soal.opsi)) {
                                    soal.opsi.forEach(opt => { htmlContent += `<li>${opt}</li>`; });
                                }
                                htmlContent += `</ol>`;
                            } else if (soal.jenis === 'Isian Singkat') {
                                htmlContent += `<p style="margin-top: 15px;">Jawaban: ________________________________________________________</p>`;
                            } else if (soal.jenis === 'Essay') {
                                htmlContent += `<p style="margin-top: 15px;">Jawaban:</p><p><br><br><br><br><br></p>`;
                            }

                            htmlContent += `</td></tr>`;
                        });

                        htmlContent += `</table>`;
                        
                        const blob = new Blob(['\ufeff', header + htmlContent + footer], { type: 'application/msword' });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('A');
                        link.href = url;
                        link.download = `Soal_${this.formData.mapel}.doc`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }, 100);
                },

                exportPDF() {
                    if(this.results.length === 0) return this.showToast("Belum ada dokumen untuk diekspor.", "error");
                    this.showToast("Membuka dialog cetak. Pilih 'Simpan sebagai PDF'.", "info");
                    setTimeout(() => { window.focus(); window.print(); }, 800);
                },

                printDoc() {
                    if(this.results.length === 0) return this.showToast("Belum ada dokumen untuk dicetak.", "error");
                    setTimeout(() => { window.focus(); window.print(); }, 200);
                },

                async generateSoal() {
                    if(!this.formData.topik) {
                        return this.showToast("Harap isi Topik/Materi terlebih dahulu!", "error");
                    }

                    if (this.totalSoal === 0) {
                        return this.showToast("Total soal tidak boleh 0!", "error");
                    }

                    if (!this.apiKey || this.apiKey.trim() === '') {
                        this.openSettings();
                        return this.showToast("Silakan masukkan API Key Gemini di Pengaturan terlebih dahulu.", "error");
                    }

                    this.isLoading = true;
                    this.results = [];
                    this.setTab('soal');

                    const prompt = `
Anda adalah guru pembuat evaluasi ahli. Buatkan soal ujian.
Kurikulum: ${this.formData.kurikulum}
Jenjang & Kelas: ${this.formData.jenjang} Kelas ${this.formData.kelas}
Mata Pelajaran: ${this.formData.mapel}
Topik/Materi: ${this.formData.topik}

Target jumlah soal:
- Pilihan Ganda (${this.formData.opsiPG}): ${this.formData.jumlahPG} soal
- Isian Singkat: ${this.formData.jumlahIsian} soal
- Essay/Uraian: ${this.formData.jumlahEssay} soal

ATURAN SOAL VISUAL (SANGAT PENTING):
User meminta ${this.formData.jumlahIlustrasi} soal Ilustrasi AI, ${this.formData.jumlahDiagram} soal Diagram, dan ${this.formData.jumlahPetaKonsep} soal Peta Konsep.
Pilih beberapa soal secara acak (PG, Isian, atau Essay) untuk disisipkan visual sesuai jumlah permintaan di atas. 
1. Soal visual WAJIB diawali dengan kalimat: "Perhatikan gambar berikut ini!<br><br>"
2. Anda WAJIB mengisi "prompt_gambar" dengan deskripsi dalam BAHASA INGGRIS yang spesifik (Contoh: "educational illustration of human digestive system").
3. Untuk soal NON-VISUAL, kosongkan "prompt_gambar" menjadi "".
4. DILARANG KERAS membuat properti "gambar" (Kosongkan saja).

WAJIB balas HANYA dengan format JSON Array tulen (tanpa awalan markdown \`\`\`json). 
Format JSON:
[
  {
    "jenis": "Pilihan Ganda",
    "pertanyaan": "Perhatikan gambar berikut ini!<br><br>Fungsi organ X adalah...",
    "opsi": ["Opsi A", "Opsi B", "Opsi C", "Opsi D"],
    "kunci": "A",
    "alasan": "Penjelasan...",
    "kognitif": "C4 (Menganalisis)",
    "kesulitan": "Sedang",
    "indikator": "Peserta didik dapat...",
    "prompt_gambar": "educational diagram of human digestive system"
  }
]`;

                    let attempt = 0;
                    const maxRetries = 3
